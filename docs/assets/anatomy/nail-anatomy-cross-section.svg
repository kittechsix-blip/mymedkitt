<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <defs>
    <linearGradient id="boneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E6"/>
      <stop offset="100%" style="stop-color:#E8E0D0"/>
    </linearGradient>
    <linearGradient id="nailPlateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8E8E0"/>
      <stop offset="50%" style="stop-color:#E8C8B8"/>
      <stop offset="100%" style="stop-color:#D8B8A8"/>
    </linearGradient>
    <linearGradient id="nailBedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB8A8"/>
      <stop offset="100%" style="stop-color:#E89888"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDCC8"/>
      <stop offset="100%" style="stop-color:#E8C4B0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="320" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Nail Anatomy - Cross Section</text>

  <!-- Distal Phalanx Bone -->
  <path d="M 80 200 Q 80 240 120 250 L 380 250 Q 420 240 420 200 L 420 180 Q 420 160 380 155 L 120 155 Q 80 160 80 180 Z" fill="url(#boneGrad)" stroke="#8B7355" stroke-width="1.5"/>
  <text x="250" y="210" font-family="Arial, sans-serif" font-size="10" fill="#5C4033" text-anchor="middle">Distal Phalanx</text>

  <!-- Nail Bed (under nail plate) -->
  <path d="M 100 155 L 100 140 Q 150 130 250 128 Q 350 130 400 140 L 400 155 Z" fill="url(#nailBedGrad)" stroke="#C87060" stroke-width="1"/>

  <!-- Germinal Matrix (proximal, darker pink) -->
  <path d="M 100 155 L 100 140 Q 120 135 180 133 L 180 155 Z" fill="#FF9080" stroke="#C87060" stroke-width="1"/>

  <!-- Sterile Matrix (distal, lighter pink) -->
  <path d="M 180 155 L 180 133 Q 300 130 400 140 L 400 155 Z" fill="#FFB8A8" stroke="#C87060" stroke-width="1"/>

  <!-- Nail Plate -->
  <path d="M 95 140 Q 150 125 250 122 Q 350 125 420 138 L 420 130 Q 350 115 250 112 Q 150 115 95 130 Z" fill="url(#nailPlateGrad)" stroke="#A08070" stroke-width="1.5"/>

  <!-- Eponychium (Cuticle) - skin fold at proximal end -->
  <path d="M 60 155 Q 60 120 95 110 L 95 130 Q 70 140 70 155 Z" fill="url(#skinGrad)" stroke="#B0967C" stroke-width="1.5"/>
  <path d="M 95 110 Q 105 105 115 108 L 100 125 Q 95 120 95 110 Z" fill="url(#skinGrad)" stroke="#B0967C" stroke-width="1"/>

  <!-- Hyponychium (skin under distal free edge) -->
  <path d="M 420 138 L 440 135 Q 455 145 455 160 L 455 175 Q 450 180 440 180 L 420 175 Z" fill="url(#skinGrad)" stroke="#B0967C" stroke-width="1.5"/>

  <!-- Proximal Nail Fold skin -->
  <path d="M 40 180 L 40 130 Q 45 100 70 90 L 95 85 Q 110 83 120 88 L 120 100 Q 105 95 90 98 Q 65 105 60 130 L 60 180 Z" fill="url(#skinGrad)" stroke="#B0967C" stroke-width="1.5"/>

  <!-- Lateral skin/paronychium indication -->
  <path d="M 420 250 L 455 240 L 455 175 Q 455 160 440 155 L 420 155 Z" fill="url(#skinGrad)" stroke="#B0967C" stroke-width="1"/>

  <!-- Labels with leader lines -->
  <style>
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .label-bold { font-family: Arial, sans-serif; font-size: 11px; fill: #333; font-weight: bold; }
  </style>

  <!-- Nail Plate label -->
  <line x1="250" y1="120" x2="250" y2="60" stroke="#666" stroke-width="1"/>
  <circle cx="250" cy="120" r="2" fill="#666"/>
  <text x="250" y="52" class="label-bold" text-anchor="middle">Nail Plate</text>

  <!-- Germinal Matrix label -->
  <line x1="140" y1="145" x2="40" y2="75" stroke="#666" stroke-width="1"/>
  <circle cx="140" cy="145" r="2" fill="#666"/>
  <text x="40" y="68" class="label-bold" text-anchor="start">Germinal Matrix</text>
  <text x="40" y="80" class="label" text-anchor="start">(proximal)</text>

  <!-- Sterile Matrix label -->
  <line x1="300" y1="145" x2="320" y2="80" stroke="#666" stroke-width="1"/>
  <circle cx="300" cy="145" r="2" fill="#666"/>
  <text x="320" y="68" class="label-bold" text-anchor="start">Sterile Matrix</text>
  <text x="320" y="80" class="label" text-anchor="start">(distal)</text>

  <!-- Eponychium label -->
  <line x1="80" y1="115" x2="20" y2="115" stroke="#666" stroke-width="1"/>
  <circle cx="80" cy="115" r="2" fill="#666"/>
  <text x="18" y="110" class="label-bold" text-anchor="end">Eponychium</text>
  <text x="18" y="122" class="label" text-anchor="end">(cuticle)</text>

  <!-- Hyponychium label -->
  <line x1="448" y1="160" x2="480" y2="120" stroke="#666" stroke-width="1"/>
  <circle cx="448" cy="160" r="2" fill="#666"/>
  <text x="480" y="112" class="label-bold" text-anchor="end">Hyponychium</text>

  <!-- Nail Bed label (general) -->
  <line x1="220" y1="148" x2="180" y2="270" stroke="#666" stroke-width="1"/>
  <circle cx="220" cy="148" r="2" fill="#666"/>
  <text x="180" y="282" class="label-bold" text-anchor="middle">Nail Bed</text>

  <!-- Distal Phalanx label -->
  <line x1="250" y1="230" x2="320" y2="280" stroke="#666" stroke-width="1"/>
  <circle cx="250" cy="230" r="2" fill="#666"/>
  <text x="320" y="292" class="label-bold" text-anchor="middle">Distal Phalanx</text>

  <!-- Lunula indicator (visible germinal matrix) -->
  <ellipse cx="135" cy="125" rx="25" ry="8" fill="rgba(255,255,255,0.5)" stroke="none"/>
  <line x1="135" y1="130" x2="90" y2="290" stroke="#666" stroke-width="1"/>
  <circle cx="135" cy="130" r="2" fill="#666"/>
  <text x="90" y="302" class="label-bold" text-anchor="middle">Lunula</text>

  <!-- Copyright/source -->
  <text x="490" y="312" font-family="Arial, sans-serif" font-size="8" fill="#999" text-anchor="end">MedKitt</text>
</svg>